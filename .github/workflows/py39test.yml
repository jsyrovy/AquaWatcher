name: Python 3.9 test
on: push
jobs:
  publish:
    runs-on: ubuntu-18.04
    steps:
      - name: Check out
        uses: actions/checkout@v2
      - name: Setup python
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"
      - name: Install requirements
        run: pip install -r publisher_requirements.txt
      - name: Publish
        run: python publisher.py
